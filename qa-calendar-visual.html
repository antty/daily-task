<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>最新日历选择视觉卡</title>
  <link rel="stylesheet" href="styles.css?v=20260719-ipad-ios-calendar">
  <link rel="stylesheet" href="extras.css?v=20260719-ipad-ios-calendar">
  <link rel="stylesheet" href="extras-3.css?v=20260719-ipad-ios-calendar">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .visual-card { width: min(760px, 100%); padding: 28px; border: 1px solid #eee7f5; border-radius: 26px; background: rgb(255 255 255 / 92%); box-shadow: 0 18px 50px rgb(66 49 91 / 12%); }
    .visual-head { display: flex; align-items: end; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
    .visual-head h1 { margin: 0; font-size: 28px; }
    .visual-head p { margin: 6px 0 0; color: #776f83; }
    .legend { color: #776f83; font-size: 13px; white-space: nowrap; }
    .compact-home .calendar-grid { grid-template-columns: repeat(7, minmax(44px, 1fr)); gap: 8px; }
    .weekday { color: #877f91; font-size: 13px; text-align: center; }
    .day { border: 0; }
    @media (max-width: 600px) {
      body { padding: 16px; }
      .visual-card { padding: 20px 14px; border-radius: 22px; }
      .visual-head { align-items: flex-start; flex-direction: column; gap: 8px; }
      .visual-head h1 { font-size: 23px; }
      .compact-home .calendar-grid { gap: 2px; }
    }
  </style>
</head>
<body>
  <section class="visual-card compact-home" aria-label="日历选择视觉预览">
    <header class="visual-head">
      <div><h1>2026 年 7 月</h1><p>圆形日期焦点 · 状态独立展示</p></div>
      <div class="legend">今天描边 · 选中实心</div>
    </header>
    <div class="calendar-grid">
      <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div><div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>
      <button class="day today"><b>13</b><span class="calendar-status complete">✓</span></button>
      <button class="day"><b>14</b><span class="calendar-status complete">✓</span></button>
      <button class="day"><b>15</b><span class="calendar-status pending">×</span></button>
      <button class="day"><b>16</b><span class="calendar-status has-task">有任务</span></button>
      <button class="day"><b>17</b><span class="calendar-status idle">无任务</span></button>
      <button class="day"><b>18</b><span class="calendar-status pending">×</span></button>
      <button class="day selected"><b>19</b><span class="calendar-status has-task">有任务</span></button>
    </div>
  </section>
</body>
</html>
