<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>创建家庭并选择成员</title>
  </head>
  <body>
    <template id="beat-2-family-template">
      <div
        id="beat-2-family"
        data-composition-id="beat-2-family"
        data-width="1920"
        data-height="1080"
      >
        <div
          id="beat-2-scene"
          class="clip beat-2-scene"
          data-start="0"
          data-duration="10.057"
          data-track-index="1"
        >
          <div class="beat-2-glow beat-2-glow-top" data-layout-ignore></div>
          <div class="beat-2-glow beat-2-glow-bottom" data-layout-ignore></div>
          <div class="beat-2-rule" data-layout-ignore></div>

          <div class="beat-2-content">
            <header class="beat-2-header">
              <div class="beat-2-heading-block">
                <div class="beat-2-eyebrow">
                  <span class="beat-2-step">01</span>
                  <span>先创建家庭</span>
                </div>
                <h1 id="beat-2-title">每个人，都有自己的任务视图</h1>
              </div>
              <div id="beat-2-callout" class="beat-2-callout">
                <span class="beat-2-callout-icon">✓</span>
                <div>
                  <strong>一人一份任务日历</strong>
                  <span>归属清楚 · 参与感更强</span>
                </div>
              </div>
            </header>

            <div id="beat-2-browser" class="beat-2-browser">
              <div class="beat-2-browser-bar">
                <div class="beat-2-window-dots" aria-hidden="true">
                  <span></span><span></span><span></span>
                </div>
                <div class="beat-2-address">
                  <span class="beat-2-lock">●</span>
                  <span>habit-family.local</span>
                </div>
                <div class="beat-2-browser-label">习惯养成</div>
              </div>

              <div class="beat-2-browser-body">
                <section class="beat-2-selector-panel">
                  <div class="beat-2-panel-label">欢迎回来</div>
                  <h2>今天以谁的身份开始？</h2>
                  <p>选择家庭成员后进入任务系统</p>

                  <div class="beat-2-members">
                    <article id="beat-2-member-lele" class="beat-2-member beat-2-member-selected">
                      <div class="beat-2-avatar beat-2-avatar-lele">乐</div>
                      <div class="beat-2-member-copy">
                        <strong>乐乐</strong>
                        <span>学习与运动计划</span>
                      </div>
                      <div class="beat-2-member-status">当前</div>
                    </article>

                    <article id="beat-2-member-anan" class="beat-2-member">
                      <div class="beat-2-avatar beat-2-avatar-anan">安</div>
                      <div class="beat-2-member-copy">
                        <strong>安安</strong>
                        <span>阅读与家务计划</span>
                      </div>
                      <div class="beat-2-member-arrow">→</div>
                    </article>
                  </div>
                </section>

                <aside class="beat-2-preview-panel">
                  <div class="beat-2-preview-head">
                    <div>
                      <span>乐乐的今日任务</span>
                      <strong>7 月 21 日</strong>
                    </div>
                    <div class="beat-2-progress">2 / 3</div>
                  </div>
                  <div class="beat-2-mini-calendar">
                    <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
                    <b>19</b><b>20</b><b class="beat-2-day-active">21</b><b>22</b><b>23</b><b>24</b><b>25</b>
                  </div>
                  <div class="beat-2-task-list">
                    <div class="beat-2-task-row beat-2-task-done">
                      <span class="beat-2-check">✓</span>
                      <span>晨读 20 分钟</span>
                      <em>已完成</em>
                    </div>
                    <div class="beat-2-task-row beat-2-task-done">
                      <span class="beat-2-check">✓</span>
                      <span>整理书桌</span>
                      <em>已完成</em>
                    </div>
                    <div class="beat-2-task-row">
                      <span class="beat-2-check"></span>
                      <span>户外运动</span>
                      <em>待完成</em>
                    </div>
                  </div>
                </aside>
              </div>

              <div id="beat-2-cursor" class="beat-2-cursor" data-layout-ignore>
                <svg viewBox="0 0 32 42" aria-hidden="true">
                  <path d="M3 2.5L27 24.5L16.5 26.2L11 39.5L3 2.5Z" />
                </svg>
              </div>
              <div id="beat-2-ripple-a" class="beat-2-ripple" data-layout-ignore></div>
              <div id="beat-2-ripple-b" class="beat-2-ripple" data-layout-ignore></div>
            </div>
          </div>
        </div>

        <style>
          @font-face {
            font-family: "PingFang SC";
            src: local("PingFang SC");
          }

          @font-face {
            font-family: "Microsoft YaHei";
            src: local("Microsoft YaHei");
          }

          #beat-2-family {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            color: #251f2d;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
          }

          #beat-2-family * {
            box-sizing: border-box;
          }

          .beat-2-scene {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8f5fb;
            background-image:
              radial-gradient(circle at 14% 16%, rgba(255, 250, 244, 0.98) 0, rgba(255, 250, 244, 0) 32%),
              radial-gradient(circle at 88% 80%, rgba(239, 233, 251, 0.92) 0, rgba(239, 233, 251, 0) 34%);
          }

          .beat-2-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 78px 150px 132px;
            gap: 34px;
          }

          .beat-2-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 80px;
          }

          .beat-2-heading-block {
            display: flex;
            flex-direction: column;
            gap: 16px;
          }

          .beat-2-eyebrow {
            display: flex;
            align-items: center;
            gap: 14px;
            color: #563b9f;
            font-size: 23px;
            font-weight: 750;
            letter-spacing: 0.06em;
          }

          .beat-2-step {
            display: grid;
            place-items: center;
            width: 46px;
            height: 46px;
            border-radius: 15px;
            background: #6f52b5;
            color: #fffaf4;
            font-size: 18px;
            font-weight: 850;
            font-variant-numeric: tabular-nums;
          }

          .beat-2-heading-block h1 {
            max-width: 970px;
            color: #251f2d;
            font-size: 68px;
            font-weight: 850;
            line-height: 1.08;
            letter-spacing: -0.055em;
          }

          .beat-2-callout {
            display: flex;
            align-items: center;
            min-width: 430px;
            gap: 18px;
            padding: 21px 26px;
            border: 1px solid #d8cbed;
            border-radius: 24px;
            background: #efe9fb;
            box-shadow: 0 20px 55px rgba(86, 59, 159, 0.1);
          }

          .beat-2-callout-icon {
            display: grid;
            place-items: center;
            width: 52px;
            height: 52px;
            flex: 0 0 52px;
            border-radius: 18px;
            background: #6f52b5;
            color: #fffaf4;
            font-size: 29px;
            font-weight: 850;
          }

          .beat-2-callout div {
            display: flex;
            flex-direction: column;
            gap: 5px;
          }

          .beat-2-callout strong {
            color: #563b9f;
            font-size: 25px;
            font-weight: 800;
          }

          .beat-2-callout div span {
            color: #706879;
            font-size: 19px;
            font-weight: 560;
          }

          .beat-2-browser {
            position: relative;
            width: 100%;
            height: 640px;
            overflow: hidden;
            border: 1px solid #dcd2e7;
            border-radius: 28px;
            background: #ffffff;
            box-shadow: 0 36px 100px rgba(37, 31, 45, 0.16);
          }

          .beat-2-browser-bar {
            display: grid;
            grid-template-columns: 230px 1fr 230px;
            align-items: center;
            height: 74px;
            padding: 0 28px;
            border-bottom: 1px solid #e7e1ec;
            background: #fffaf4;
          }

          .beat-2-window-dots {
            display: flex;
            gap: 12px;
          }

          .beat-2-window-dots span {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #d8cbed;
          }

          .beat-2-window-dots span:nth-child(2) {
            background: #c3b2e3;
          }

          .beat-2-window-dots span:nth-child(3) {
            background: #9f87d3;
          }

          .beat-2-address {
            display: flex;
            align-items: center;
            justify-content: center;
            justify-self: center;
            width: 530px;
            gap: 12px;
            padding: 10px 22px;
            border: 1px solid #e7e1ec;
            border-radius: 14px;
            background: #ffffff;
            color: #706879;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.01em;
          }

          .beat-2-lock {
            color: #3d8b6a;
            font-size: 12px;
          }

          .beat-2-browser-label {
            justify-self: end;
            color: #563b9f;
            font-size: 20px;
            font-weight: 780;
          }

          .beat-2-browser-body {
            display: grid;
            grid-template-columns: 0.88fr 1.12fr;
            height: calc(100% - 74px);
          }

          .beat-2-selector-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 14px;
            padding: 48px 58px;
            border-right: 1px solid #e7e1ec;
            background: #ffffff;
          }

          .beat-2-panel-label {
            color: #6f52b5;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.16em;
          }

          .beat-2-selector-panel h2 {
            max-width: 570px;
            color: #251f2d;
            font-size: 39px;
            font-weight: 850;
            line-height: 1.16;
            letter-spacing: -0.04em;
          }

          .beat-2-selector-panel > p {
            color: #706879;
            font-size: 21px;
            font-weight: 540;
          }

          .beat-2-members {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-top: 18px;
          }

          .beat-2-member {
            display: grid;
            grid-template-columns: 68px 1fr auto;
            align-items: center;
            gap: 18px;
            min-height: 96px;
            padding: 15px 22px;
            border: 2px solid #e7e1ec;
            border-radius: 22px;
            background: #ffffff;
          }

          .beat-2-member-selected {
            border-color: #9f87d3;
            background: #f8f5fb;
            box-shadow: 0 14px 35px rgba(86, 59, 159, 0.1);
          }

          .beat-2-avatar {
            display: grid;
            place-items: center;
            width: 62px;
            height: 62px;
            border-radius: 21px;
            color: #ffffff;
            font-size: 27px;
            font-weight: 850;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
          }

          .beat-2-avatar-lele {
            background: #6f52b5;
          }

          .beat-2-avatar-anan {
            background: #3d8b6a;
          }

          .beat-2-member-copy {
            display: flex;
            flex-direction: column;
            gap: 5px;
          }

          .beat-2-member-copy strong {
            color: #251f2d;
            font-size: 26px;
            font-weight: 820;
          }

          .beat-2-member-copy span {
            color: #706879;
            font-size: 18px;
            font-weight: 520;
          }

          .beat-2-member-status {
            padding: 8px 14px;
            border-radius: 999px;
            background: #efe9fb;
            color: #563b9f;
            font-size: 17px;
            font-weight: 780;
          }

          .beat-2-member-arrow {
            color: #9f87d3;
            font-size: 30px;
            font-weight: 700;
          }

          .beat-2-preview-panel {
            display: flex;
            flex-direction: column;
            gap: 28px;
            padding: 44px 50px;
            background: #f8f5fb;
          }

          .beat-2-preview-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
          }

          .beat-2-preview-head > div:first-child {
            display: flex;
            flex-direction: column;
            gap: 6px;
          }

          .beat-2-preview-head span {
            color: #706879;
            font-size: 19px;
            font-weight: 600;
          }

          .beat-2-preview-head strong {
            color: #251f2d;
            font-size: 31px;
            font-weight: 850;
          }

          .beat-2-progress {
            display: grid;
            place-items: center;
            width: 82px;
            height: 82px;
            border: 7px solid #c8eadb;
            border-radius: 50%;
            background: #ffffff;
            color: #3d8b6a;
            font-size: 22px;
            font-weight: 850;
            font-variant-numeric: tabular-nums;
          }

          .beat-2-mini-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            align-items: center;
            gap: 9px;
            padding: 18px 20px;
            border: 1px solid #e7e1ec;
            border-radius: 20px;
            background: #ffffff;
            text-align: center;
          }

          .beat-2-mini-calendar span {
            color: #706879;
            font-size: 15px;
            font-weight: 650;
          }

          .beat-2-mini-calendar b {
            display: grid;
            place-items: center;
            width: 44px;
            height: 44px;
            justify-self: center;
            border-radius: 14px;
            color: #251f2d;
            font-size: 18px;
            font-weight: 750;
            font-variant-numeric: tabular-nums;
          }

          .beat-2-mini-calendar .beat-2-day-active {
            background: #6f52b5;
            color: #fffaf4;
            box-shadow: 0 8px 20px rgba(86, 59, 159, 0.24);
          }

          .beat-2-task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
          }

          .beat-2-task-row {
            display: grid;
            grid-template-columns: 34px 1fr auto;
            align-items: center;
            gap: 13px;
            min-height: 56px;
            padding: 10px 15px;
            border: 1px solid #e7e1ec;
            border-radius: 16px;
            background: #ffffff;
            color: #251f2d;
            font-size: 19px;
            font-weight: 650;
          }

          .beat-2-check {
            display: grid;
            place-items: center;
            width: 28px;
            height: 28px;
            border: 2px solid #d8cbed;
            border-radius: 9px;
            color: #ffffff;
            font-size: 17px;
            font-style: normal;
          }

          .beat-2-task-done .beat-2-check {
            border-color: #3d8b6a;
            background: #3d8b6a;
          }

          .beat-2-task-row em {
            color: #706879;
            font-size: 16px;
            font-style: normal;
            font-weight: 650;
          }

          .beat-2-task-done em {
            color: #3d8b6a;
          }

          .beat-2-cursor {
            position: absolute;
            z-index: 12;
            top: 368px;
            left: 575px;
            width: 38px;
            height: 50px;
            filter: drop-shadow(0 6px 6px rgba(37, 31, 45, 0.18));
          }

          .beat-2-cursor svg {
            width: 100%;
            height: 100%;
          }

          .beat-2-cursor path {
            fill: #563b9f;
            stroke: #fffaf4;
            stroke-width: 2.5;
            stroke-linejoin: round;
          }

          .beat-2-ripple {
            position: absolute;
            z-index: 11;
            top: 339px;
            left: 540px;
            width: 76px;
            height: 76px;
            border: 4px solid #6f52b5;
            border-radius: 50%;
            opacity: 0;
          }

          .beat-2-glow {
            position: absolute;
            z-index: 0;
            border-radius: 50%;
            filter: blur(12px);
          }

          .beat-2-glow-top {
            top: -190px;
            left: -70px;
            width: 580px;
            height: 580px;
            background: rgba(255, 250, 244, 0.95);
          }

          .beat-2-glow-bottom {
            right: -120px;
            bottom: -260px;
            width: 700px;
            height: 700px;
            background: rgba(239, 233, 251, 0.82);
          }

          .beat-2-rule {
            position: absolute;
            z-index: 1;
            top: 78px;
            right: 100px;
            width: 340px;
            height: 2px;
            background: #c3b2e3;
          }
        </style>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
        <script>
          window.__timelines = window.__timelines || {};
          const beat2Timeline = gsap.timeline({ paused: true });

          beat2Timeline.from(".beat-2-glow-top", { opacity: 0, scale: 0.82, duration: 1.15, ease: "sine.out" }, 0.2);
          beat2Timeline.from(".beat-2-glow-bottom", { opacity: 0, scale: 0.9, duration: 1.35, ease: "power1.out" }, 0.3);
          beat2Timeline.from(".beat-2-rule", { scaleX: 0, transformOrigin: "right center", duration: 0.75, ease: "expo.out" }, 0.24);
          beat2Timeline.from(".beat-2-eyebrow", { x: -42, opacity: 0, duration: 0.56, ease: "power3.out" }, 0.35);
          beat2Timeline.from("#beat-2-title", { x: -16, y: 46, opacity: 0, duration: 0.78, ease: "expo.out" }, 0.54);
          beat2Timeline.from("#beat-2-callout", { x: 74, opacity: 0, scale: 0.95, duration: 0.72, ease: "back.out(1.2)" }, 0.72);

          beat2Timeline.from("#beat-2-browser", { y: 110, opacity: 0, scale: 0.965, duration: 0.92, ease: "power4.out" }, 1.04);
          beat2Timeline.from(".beat-2-browser-bar", { y: -22, opacity: 0, duration: 0.46, ease: "power2.out" }, 1.48);
          beat2Timeline.from(".beat-2-selector-panel > :not(.beat-2-members)", { x: -32, opacity: 0, duration: 0.52, stagger: 0.09, ease: "power3.out" }, 1.66);
          beat2Timeline.from("#beat-2-member-lele", { x: -64, opacity: 0, duration: 0.64, ease: "expo.out" }, 1.94);
          beat2Timeline.from("#beat-2-member-anan", { x: -38, opacity: 0, scale: 0.97, duration: 0.58, ease: "back.out(1.15)" }, 2.1);

          beat2Timeline.from(".beat-2-preview-head", { y: 34, opacity: 0, duration: 0.56, ease: "power3.out" }, 2.02);
          beat2Timeline.from(".beat-2-mini-calendar", { y: 42, opacity: 0, scale: 0.96, duration: 0.66, ease: "expo.out" }, 2.2);
          beat2Timeline.from(".beat-2-task-row", { x: 44, opacity: 0, duration: 0.48, stagger: 0.1, ease: "power2.out" }, 2.38);

          beat2Timeline.from("#beat-2-cursor", { x: 210, y: 105, opacity: 0, duration: 0.72, ease: "power3.out" }, 3.34);
          beat2Timeline.to("#beat-2-cursor", { x: -8, y: -8, duration: 0.48, ease: "sine.inOut" }, 4.1);
          beat2Timeline.fromTo("#beat-2-ripple-a", { opacity: 0.7, scale: 0.25 }, { opacity: 0, scale: 1, duration: 0.56, ease: "power2.out" }, 4.54);
          beat2Timeline.fromTo("#beat-2-ripple-b", { opacity: 0.48, scale: 0.2 }, { opacity: 0, scale: 1.35, duration: 0.76, ease: "sine.out" }, 4.61);
          beat2Timeline.to("#beat-2-member-lele", { borderColor: "#6f52b5", backgroundColor: "#efe9fb", scale: 1.012, duration: 0.35, ease: "power2.out" }, 4.56);
          beat2Timeline.to(".beat-2-progress", { scale: 1.08, duration: 0.3, ease: "back.out(1.5)" }, 4.82);
          beat2Timeline.to(".beat-2-progress", { scale: 1, duration: 0.34, ease: "sine.inOut" }, 5.12);
          beat2Timeline.to(".beat-2-glow-bottom", { scale: 1.04, x: -18, duration: 4.2, ease: "sine.inOut" }, 5.3);

          window.__timelines["beat-2-family"] = beat2Timeline;
        </script>
      </div>
    </template>
  </body>
</html>
